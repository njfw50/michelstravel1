    <script type="application/ld+json">

        "@type": "OpeningHoursSpecification",
        "dayOfWeek": ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday", "Sunday"],

        { "@type": "Place", "name": "New Jersey" },

        { "@type": "Country", "name": "United States" },

        "name": "Passagens Aéreas e Atendimento",

          {
            "@type": "OfferCatalog",
            "name": "Voos Nacionais e Internacionais",
            "description": "Pesquisa, comparação e suporte para reservas de voos em rotas nacionais e internacionais."
          }

      },
      "knowsLanguage": ["pt", "en", "es"]
