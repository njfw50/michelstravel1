<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Guia Atualizado | Michels Travel</title>
  <meta
    http-equiv="refresh"
    content="0; url=https://www.michelstravel.agency/orlando-guide.html"
  />
  <meta
    name="description"
    content="Este guia foi atualizado. Agora voce encontra nosso conteudo de Disney e Universal em Orlando em uma nova pagina."
  />
  <link rel="canonical" href="https://www.michelstravel.agency/orlando-guide.html" />
  <style>
    :root {
      --bg: #f4f7fb;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --border: #dbe5f1;
      --shadow: 0 18px 48px rgba(15, 23, 42, 0.12);
      --radius: 24px;
      --font: "DM Sans", Arial, sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: var(--font);
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(37, 99, 235, 0.16), transparent 34%),
        radial-gradient(circle at bottom right, rgba(14, 165, 233, 0.12), transparent 30%),
        var(--bg);
    }

    .card {
      width: min(720px, 100%);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 40px;
    }

    .eyebrow {
      display: inline-block;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(37, 99, 235, 0.1);
      color: var(--primary-dark);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1 {
      margin: 18px 0 14px;
      font-size: clamp(2rem, 5vw, 3.4rem);
      line-height: 1;
      letter-spacing: -0.04em;
    }

    p {
      margin: 0 0 18px;
      font-size: 1.05rem;
      line-height: 1.7;
      color: var(--muted);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 28px;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 0 18px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 700;
      transition: transform 0.15s ease, background 0.15s ease;
    }

    .button-primary {
      background: var(--primary);
      color: white;
    }

    .button-primary:hover {
      background: var(--primary-dark);
      transform: translateY(-1px);
    }

    .button-secondary {
      border: 1px solid var(--border);
      color: var(--text);
      background: #f8fbff;
    }

    .button-secondary:hover {
      background: #eef5ff;
      transform: translateY(-1px);
    }
  </style>
</head>
<body>
  <main class="card">
    <span class="eyebrow">Guia Atualizado</span>
    <h1>O conteudo mudou para Orlando</h1>
    <p>
      O antigo guia foi substituido por um guia focado em Disney e Universal.
      Se voce nao for redirecionado automaticamente, use os botoes abaixo.
    </p>
    <div class="actions">
      <a class="button button-primary" href="/orlando-guide.html">Abrir Guia de Orlando</a>
      <a class="button button-secondary" href="/">Voltar ao site</a>
    </div>
  </main>

  <script>
    window.location.replace("/orlando-guide.html");
  </script>
</body>
</html>
