previews:
  generation: manual

services:
  - type: web
    name: michelstravel
    runtime: node
    buildCommand: npm install --legacy-peer-deps && npm run build
    startCommand: npm run start
    healthCheckPath: /api/health
    autoDeploy: true
    domains:
      - www.michelstravel.agency
    envVars:
      - key: NODE_VERSION
        value: 20.19.0
      - key: NODE_ENV
        value: production
      - key: APP_URL
        value: https://www.michelstravel.agency
      - key: GITHUB_CALLBACK_URL
        value: https://www.michelstravel.agency/api/auth/github/callback
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: ADMIN_PASSWORD
        sync: false
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: STRIPE_TEST_SECRET_KEY
        sync: false
      - key: STRIPE_TEST_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_LIVE_SECRET_KEY
        sync: false
      - key: STRIPE_LIVE_PUBLISHABLE_KEY
        sync: false
      - key: DUFFEL_API_TOKEN
        sync: false
      - key: DUFFEL_LIVE_TOKEN
        sync: false
      - key: DUFFEL_WEBHOOK_SECRET
        sync: false
      - key: AI_INTEGRATIONS_OPENAI_API_KEY
        sync: false
      - key: AI_INTEGRATIONS_OPENAI_BASE_URL
        value: https://api.openai.com/v1
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: FACEBOOK_PAGE_ACCESS_TOKEN
        sync: false
      - key: FACEBOOK_RECIPIENT_ID
        sync: false
